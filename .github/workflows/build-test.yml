name: 'build-test'
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
    - main
    - 'releases/*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Run plugin check
      uses: wordpress/plugin-check-action@v1
      with:
        exclude-directories: 'docs,.agents,.claude,.interface-design,openspec'
        exclude-files: 'CLAUDE.md,SECURITY.md,skills-lock.json,.gitignore'
